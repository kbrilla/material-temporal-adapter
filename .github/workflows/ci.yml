name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Test packages
        run: pnpm test

      - name: Coverage
        run: pnpm test:cov

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/material-temporal-adapter/coverage/lcov.info
          fail_ci_if_error: false

      - name: Build Storybook demo
        run: pnpm demo:build
